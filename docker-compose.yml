version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mailia-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:8000"
    env_file: .env
    volumes:
      - attachments_data:/data/attachments
      - import_data:/data/imports
      - ./rules:/data/rules:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mailia-net

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: mailia-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - attachments_data:/data/attachments
      - ./rules:/data/rules:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      tika:
        condition: service_started
    networks:
      - mailia-net

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: mailia-beat
    restart: unless-stopped
    command: celery -A src.worker.app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mailia-net

  telegram:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mailia-telegram
    restart: unless-stopped
    command: python -m src.telegram_bot.main
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mailia-net

  postgres:
    image: postgres:16-alpine
    container_name: mailia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mailia}
      POSTGRES_USER: ${POSTGRES_USER:-mailia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailia}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mailia-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: mailia-elastic
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mailia-net

  redis:
    image: redis:7-alpine
    container_name: mailia-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mailia_redis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mailia_redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mailia-net

  tika:
    image: apache/tika:latest
    container_name: mailia-tika
    restart: unless-stopped
    networks:
      - mailia-net

volumes:
  postgres_data:
  elastic_data:
  attachments_data:
  import_data:

networks:
  mailia-net:
    driver: bridge

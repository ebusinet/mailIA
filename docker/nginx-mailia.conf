server {
    listen 80;
    server_name mailia.expert-presta.com;

    # Redirect HTTP -> HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name mailia.expert-presta.com;

    # SSL certs (Let's Encrypt via certbot)
    ssl_certificate /etc/letsencrypt/live/mailia.expert-presta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mailia.expert-presta.com/privkey.pem;

    client_max_body_size 50M;

    # API and WebSocket
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for local AI bridge
    location /ws/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Static files (web UI)
    location /static/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
    }

    # Root -> web UI
    location / {
        rewrite ^ /static/index.html break;
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
    }
}
